name: Jalopy Sniper Dashboard
on:
  workflow_dispatch:
    inputs:
      make:
        description: 'Make'
        required: true
        default: 'TOYOTA'
      model:
        description: 'Model'
        required: true
        default: 'YARIS'

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Stealth Sniper
        run: |
          pip install playwright playwright-stealth requests
          playwright install chromium
      - name: Run Sniper
        env:
          INPUT_MAKE: ${{ github.event.inputs.make }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
        run: python sniper.py
