name: Jalopy Sniper Dashboard

on:
  workflow_dispatch:
    inputs:
      make:
        description: 'Vehicle Make (e.g., TOYOTA)'
        required: true
        default: 'TOYOTA'
      model:
        description: 'Vehicle Model (e.g., RAV4)'
        required: true
        default: 'RAV4'
      year_start:
        description: 'Earliest Year'
        required: false
        default: '1900'
      year_end:
        description: 'Latest Year'
        required: false
        default: '2026'

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          clean: true # This ensures a fresh environment every time

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Run Sniper
        env:
          INPUT_MAKE: ${{ github.event.inputs.make }}
          INPUT_MODEL: ${{ github.event.inputs.model }}
          INPUT_YEAR_START: ${{ github.event.inputs.year_start }}
          INPUT_YEAR_END: ${{ github.event.inputs.year_end }}
        run: python sniper.py
