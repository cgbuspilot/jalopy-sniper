name: Jalopy Sniper Dashboard
on:
  workflow_dispatch:
jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Advanced Sniper
        run: |
          pip install patchright requests
          python -m patchright install chromium
      - name: Run Sniper
        run: python sniper.py
