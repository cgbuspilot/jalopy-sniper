name: Jalopy Sniper Dashboard

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
    inputs:
      make:
        description: 'Car Make (e.g. TOYOTA)'
        required: true
        default: 'TOYOTA'
      model:
        description: 'Car Model (e.g. TUNDRA)'
        required: false
        default: ''
      year_start:
        description: 'Earliest Year'
        required: false
        default: '1995'
      year_end:
        description: 'Latest Year'
        required: false
        default: '2005'
      location:
        description: 'Location'
        type: choice
        options:
          - ALL
          - BOISE
          - CALDWELL
          - NAMPA
          - GARDEN CITY
          - TWIN FALLS

jobs:
  hunt:
    runs-on: ubuntu-latest
    env:
      INPUT_MAKE: ${{ github.event.inputs.make }}
      INPUT_MODEL: ${{ github.event.inputs.model }}
      INPUT_YEAR_START: ${{ github.event.inputs.year_start }}
      INPUT_YEAR_END: ${{ github.event.inputs.year_end }}
      INPUT_LOCATION: ${{ github.event.inputs.location }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: |
          pip install playwright requests
          playwright install chromium
      - run: python sniper.py
